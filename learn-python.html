<h1>Why analysts use Python and not just Excel</h1>
<p class="art-lead">Excel is a great tool. But there is a point in every analyst's career where Excel stops being the right tool - and if you are joining a company like Flipkart, Swiggy, or Meesho, you will hit that point very fast.</p>

<h2>The wall Excel hits</h2>
<p>Excel struggles badly once you cross about 1 lakh rows. Try opening a 10-lakh-row Flipkart daily order dump in Excel and your laptop will either freeze or take 10 minutes just to scroll. That is not a hardware problem. Excel was not built for that volume.</p>
<p>Beyond row limits, there is the repeatability problem. Every morning the Flipkart analytics team receives a fresh order file. In Excel, someone manually applies the same filters, runs the same pivot tables, copies numbers into the same summary sheet. Every. Single. Day. If that person is on leave, the report breaks. If they made a mistake in step 4 last Tuesday, nobody will catch it until a week later.</p>
<p>Excel also has no version control. When you save "report_final_v3_FINAL_use_this_one.xlsx" you have no idea what changed from v2. You cannot roll back. You cannot track who changed what.</p>

<div class="art-callout">Python solves all three problems. It handles tens of millions of rows without breaking a sweat. It runs the same steps in the same order every time, automatically. And because your analysis is code, you can put it in Git and track every single change.</div>

<h2>What analysts actually use Python for</h2>
<p>Be honest with yourself here - you are not going to build a recommendation engine in your first year as a data analyst. The real use cases are less glamorous but far more valuable on the job:</p>

<div class="art-two-col">

    <div class="art-card-title">Automation</div>
    <p>Any analysis you do more than twice should be automated. Python lets you schedule scripts so the report is ready in your inbox before you wake up.</p>
  </div>
  <div class="art-card">
    <div class="art-card-title">Large Data Handling</div>
    <p>Flipkart processes lakhs of orders every day. Python with pandas can load, filter, and aggregate a 50 lakh row file in under a minute.</p>
  </div>
  <div class="art-card">
    <div class="art-card-title">Repeatable Analysis</div>
    <p>When the business asks the same question next quarter, you run the same script with new data. No re-doing work from scratch.</p>
  </div>
</div>

<h2>A concrete Flipkart scenario</h2>
<p>Imagine Flipkart's category team sends you a CSV every morning with all orders from the previous day - 8 lakh rows, columns for order ID, seller ID, product category, city, amount, status (delivered/cancelled/returned). They want a summary: total GMV by category, cancellation rate by city, top 10 sellers.</p>
<p>In Excel, this is 30 minutes of work every morning - open file, apply filters, build pivot, copy to summary sheet, format. In Python, this is a 20-line script that runs in 15 seconds. You write it once on Monday, and on Tuesday it just works. On Wednesday it works. On the day you are sick at home it still works, because you set it to run automatically.</p>

<pre><code># A simple preview of what this looks like in Python
# (Do not worry about understanding every line yet - we will cover all of this)

import pandas as pd

# Load the 8-lakh-row file
orders = pd.read_csv('flipkart_orders_2024_01_15.csv')

# GMV by category - one line
gmv_by_category = orders.groupby('category')['amount'].sum()

# Cancellation rate by city - two lines
cancelled = orders[orders['status'] == 'Cancelled']
cancel_rate = cancelled.groupby('city').size() / orders.groupby('city').size()

print(gmv_by_category)
print(cancel_rate)
</code></pre>

  ...<br><br>
  city<br>
  Bengaluru    0.12<br>
  Delhi        0.15<br>
  Mumbai       0.11<br>
  ...

<p>That is a GMV summary and cancellation rate for every city, from 8 lakh rows, in seconds. This is what Python enables. You are not doing data science - you are doing your job faster and with fewer errors.</p>

<div class="art-warn"><strong>Common misconception.</strong> Many people think learning Python means you are becoming a software engineer or data scientist. You are not. You are becoming a better analyst. Python is a tool, the same way SQL is a tool. The goal is always business insight - Python is just how you get there faster.</div>

<h1>How a computer reads your code</h1>
<p class="art-lead">Before you write a single line of Python, you need the right mental model for what is actually happening when you run code. Most beginner confusion comes from not having this model clearly in place.</p>

<h2>Python reads top to bottom, one line at a time</h2>
<p>This sounds obvious, but it is the most important thing to understand. Python starts at line 1, executes it, moves to line 2, executes it, and so on. It does not look ahead. It does not make assumptions. It does not understand what you "meant". It does exactly what each line says, in order.</p>
<p>Think of it like giving written instructions to a new intern on their first day. You write: "Open the laptop. Go to the Zomato dashboard. Download yesterday's orders. Save the file as orders.csv." The intern reads step 1, does it, reads step 2, does it. They will not skip to step 3 before finishing step 2. They will not do step 4 if you never wrote it.</p>
<p>Python is that intern - except Python is completely literal and has no common sense. If you write something ambiguous or incorrect, Python will not "figure it out". It will either crash or give you the wrong answer silently, which is worse.</p>

<div class="art-callout">The most useful debugging habit you can build right now: when your code does something unexpected, read it line by line from the top and ask "what does the computer actually do at this line?" Not what you want it to do. What it actually does.</div>

<h2>Variables are labelled boxes</h2>
<p>When you write <code>order_count = 450</code>, you are creating a box, labelling it "order_count", and putting the value 450 inside it. Any time you later write "order_count", Python opens that box and takes out 450.</p>
<p>The box can be opened, emptied, and refilled. If you later write <code>order_count = 612</code>, the box now contains 612. The old value 450 is gone.</p>

<h2>Functions are saved instructions</h2>
<p>A function is a named set of instructions that you can call whenever you need them. <code>print()</code> is a function built into Python. When you write <code>print("hello")</code>, you are saying "run the saved instruction called print, and pass it the word hello". The function then executes its internal logic - which ultimately puts text on your screen.</p>
<p>You will write your own functions later. For now, just understand that every function call is you delegating work to a saved set of steps.</p>

<h2>Walking through a real script, line by line</h2>
<p>Here is a 6-line script. Read it before running it and predict what each line does.</p>

<pre><code># This script calculates the average order value for Zomato

total_revenue = 85000        # Line 1
number_of_orders = 340       # Line 2
average_order_value = total_revenue / number_of_orders   # Line 3
print("Average order value (Rs.):")    # Line 4
print(average_order_value)             # Line 5
</code></pre>
<div class="art-output">
  <div class="art-output-label">OUTPUT</div>
  Average order value (Rs.):<br>
  250.0
</div>

<p>Here is what Python actually did, step by step:</p>

<div class="art-steps">
  <div class="art-step">
    <div class="art-snum">1</div>
    <div class="art-sbody">
      <strong>Line 1: total_revenue = 85000</strong>
      <p>Python creates a box called "total_revenue" and stores the number 85000 in it. Nothing is printed. Nothing is shown. The value just sits in memory.</p>
    </div>
  </div>
  <div class="art-step">
    <div class="art-snum">2</div>
    <div class="art-sbody">
      <strong>Line 2: number_of_orders = 340</strong>
      <p>Python creates another box called "number_of_orders" and stores 340. Again, nothing visible happens.</p>
    </div>
  </div>
  <div class="art-step">
    <div class="art-snum">3</div>
    <div class="art-sbody">
      <strong>Line 3: average_order_value = total_revenue / number_of_orders</strong>
      <p>Python opens the "total_revenue" box (gets 85000), opens the "number_of_orders" box (gets 340), divides them (85000 / 340 = 250.0), and stores the result in a new box called "average_order_value".</p>
    </div>
  </div>
  <div class="art-step">
    <div class="art-snum">4</div>
    <div class="art-sbody">
      <strong>Line 4: print("Average order value (Rs.):")</strong>
      <p>Python calls the print function with the text "Average order value (Rs.):". This is the first line that produces any visible output.</p>
    </div>
  </div>
  <div class="art-step">
    <div class="art-snum">5</div>
    <div class="art-sbody">
      <strong>Line 5: print(average_order_value)</strong>
      <p>Python opens the "average_order_value" box (gets 250.0) and passes it to print. The value 250.0 appears on screen.</p>
    </div>
  </div>
</div>

<div class="art-warn"><strong>Order matters absolutely.</strong> If you put line 3 before line 1 and line 2, Python would crash. It would try to divide "total_revenue" by "number_of_orders" but those boxes would not exist yet. This is a very common beginner mistake.</div>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>Python executes code top to bottom, one line at a time. Variables store values in memory. Functions are named instructions you call by name. When something goes wrong, read the code as Python would - line by line, literally, without assumptions.</div>

<h1>Setting up Google Colab</h1>
<p class="art-lead">Google Colab is where you will write and run Python for the rest of this course. It is free, runs in your browser, needs no installation, and comes with most data analysis libraries already installed. It is also what most analytics teams at Indian startups use for exploratory work.</p>

<h2>What Colab actually is</h2>
<p>Colab is a Jupyter Notebook hosted by Google on their servers. When you run code in Colab, it runs on a Google machine in the cloud - not on your laptop. This means even if your laptop is slow or old, Colab will run your code fast. It also means if you close the browser tab, your runtime may reset (more on this later).</p>
<p>A notebook is a document that mixes code and text. Think of it as a combination of a script and a Word document. You write code in code cells and notes or explanations in text cells. This format is ideal for analysis because you can document your thinking right next to your code.</p>

<p>Python provides conversion functions: int(), float(), str(), and bool(). Use them to convert values from one type to another.</p>

<h1>Common beginner mistakes with data types</h1>
<p class="art-lead">These five mistakes appear in nearly every new analyst's first few weeks of Python. Learn to recognise them now so you spend less time confused later.</p>

<h2>Mistake 1: String vs number confusion in comparisons</h2>
<p>When you load data from a CSV and compare a string "450" with an integer 450, Python will say they are not equal. No error, no warning - just silently wrong results.</p>

<p>In Python 3, dividing two integers with / always gives a float. But new analysts sometimes use // thinking it is the "normal" division, and lose the decimal part of every calculation.</p>

  Wrong rate %: 0
</div>

<p>The cancellation rate is 15% but you would report it as 0% - a substantial error in any business context.</p>

<h2>Mistake 3: Float precision surprises</h2>
<p>Computers store decimal numbers in binary, and some fractions cannot be represented exactly in binary. This causes tiny precision errors in float arithmetic.</p>

</div>

<pre><code>price = 0.1 + 0.2

print(round(price, 2) == 0.3)
</code></pre>

  0.3<br>
  True
</div>

<h2>Mistake 4: None is not zero</h2>
<p>None in Python means "no value". It is not 0, not an empty string, not False. When your data has missing values, they often come in as None. Doing arithmetic on None crashes your code.</p>

<pre><code># None is not zero

print(missing_revenue is None)  # True - correct way to check for None

<p>Python lets you compare values of different types in some cases, and the result is not always what you expect. Comparing a boolean True to integer 1 returns True - because Python treats True as 1 internally. This causes confusing bugs.</p>

<pre><code>print(True == 1)    # True - confusing but how Python works

<p class="art-lead">Strings in Python are sequences of characters. You can access individual characters or extract portions of a string using indexing and slicing. This is essential for parsing product SKUs, order IDs, and other structured text fields in your data.</p>

<p class="art-lead">A tuple is like a list but immutable - once you create it, you cannot add, remove, or change its items. This sounds like a limitation but it is actually a feature. When data represents a fixed fact, making it a tuple communicates intent: this data is not supposed to change.</p>

<p>In data work, there are many fixed facts. A delivery location has a fixed latitude and longitude. A platform fee is set for the financial year. A function returns exactly two values - success flag and the result. Tuples are the right tool for all of these.</p>

<h2>Creating a tuple</h2>
<p>Tuples use parentheses instead of square brackets. You can also create a tuple without parentheses, just by using commas - Python sees the commas and knows it is a tuple. But use parentheses for clarity.</p>

<pre><code>
# Fixed config values for a food delivery platform
platform_fee = (5.0, 0.18, 0.02)   # (base_fee, gst_rate, surge_multiplier)
print(platform_fee)
print(type(platform_fee))

# Coordinates of Swiggy's Bengaluru warehouse
warehouse_location = (12.9716, 77.5946)
print("Lat:", warehouse_location[0], "Lon:", warehouse_location[1])
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
(5.0, 0.18, 0.02)
&lt;class 'tuple'&gt;
Lat: 12.9716 Lon: 77.5946
</div>

<h2>Tuples are immutable - this is intentional</h2>
<p>Trying to change a tuple item raises a TypeError. This is the whole point - Python enforces the constraint for you. If someone tries to accidentally overwrite a tax rate or a coordinate, the code fails loudly instead of silently corrupting data.</p>

<pre><code>

</code></pre>

</div>

<h2>Tuple unpacking</h2>
<p>Tuple unpacking is one of the most elegant Python patterns. You assign multiple variables in one line by matching the structure of the tuple. Functions that return multiple values actually return a tuple - unpacking lets you split those values into named variables immediately.</p>

<div class="art-callout"><strong>Performance note:</strong> Tuples are slightly faster than lists and use less memory. When you have a fixed sequence that you iterate over frequently (like GST slabs or tier-1 cities), using a tuple instead of a list is a small but meaningful optimization.</div>

<h2>When to use a tuple vs a list</h2>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>Immutability is a feature, not a bug. Use tuples for fixed facts - config, coordinates, constants. Use tuple unpacking to cleanly receive multiple return values from functions.</div>

<p class="art-lead">A set is an unordered collection that automatically keeps only unique values. Duplicates are silently discarded. For analysts, sets solve one of the most common problems: finding unique customers, unique cities, unique product IDs in a dataset that may have repeats.</p>

<h1>if, elif, else with real business decisions</h1>
<p class="art-lead">Conditional logic is how you encode business rules in code. Every analyst pipeline has rules: flag transactions above a threshold, categorize customers by spend, route orders based on status. Python's if/elif/else structure handles all of this. Understanding it well is not optional.</p>

<p>Before anything else, understand Python's indentation rule. Python does not use curly braces to define blocks of code. It uses indentation - usually 4 spaces. The code inside an if block must be consistently indented. Mixing spaces and tabs causes errors. Every modern code editor handles this automatically, but you must understand what is happening.</p>

<div class="art-callout"><strong>Indentation is syntax in Python.</strong> It is not a style choice. An indented line belongs to the block above it. This is different from JavaScript, Java, or SQL where whitespace is ignored. Take this seriously from day one.</div>

<h2>Simple if statement</h2>
<p>An if statement runs its block only when the condition is True. The condition is any expression that evaluates to a boolean. Comparison operators: == (equal), != (not equal), &gt; &gt;= &lt; &lt;=. Logical operators: and, or, not.</p>

<pre><code>

if transaction_amount > 3000:

High-value transaction. Flag for review.
Amount: 4500
</div>

<h2>if/else - the fallback path</h2>
<p>The else block runs when the if condition is False. Every if can have one else. There is no condition on else - it is always the fallback. Think of it as "in all other cases".</p>

<pre><code>

    print("High-value transaction. Flag for review.")
else:
    print("Normal transaction. Process normally.")
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Normal transaction. Process normally.
</div>

<h2>if/elif/else - multiple conditions</h2>
<p>Use elif when you have more than two possible paths. Python checks conditions from top to bottom and executes the first matching block, then skips the rest. The order of your elif conditions can matter - always think about which condition is most specific and put it first.</p>

<pre><code>

<h1>while loops: when to use and when to avoid</h1>
<p class="art-lead">A while loop runs its block of code repeatedly as long as a condition remains True. Unlike a for loop, which iterates over a known collection, a while loop continues until something changes to stop it. This gives it power, and it also makes it dangerous if you are not careful.</p>

<p>Here is the honest assessment: if you are a data analyst working with Python, you will rarely write while loops. For loops cover most iteration needs. The main legitimate use cases for while loops in analyst work are retrying operations that might fail, and simulating processes that advance until a condition is met. Learn the concept, recognize the danger, and use it sparingly.</p>

<h2>Basic while loop structure</h2>
<p>The loop has three parts: the initialization (set up the variable you will check), the condition (keep going while this is True), and the update (change the variable inside the loop so the condition eventually becomes False). If you forget the update step, you get an infinite loop.</p>

        print(f"  Success on attempt {attempt}!")
    else:
        print(f"  Failed. Retrying...")
    attempt += 1

if not success:
    print("All attempts failed. Alert the data engineering team.")

  Success on attempt 3!

<h2>The danger of infinite loops</h2>
<p>If the condition never becomes False, the loop runs forever and hangs your program. This happens when you forget to update the variable controlling the condition. Always include a clear termination condition and double-check it before running.</p>

<pre><code>

<h1>Why functions exist and why you need them</h1>
<p class="art-lead">A function is a named, reusable block of code. You write it once, give it a name, and call it by that name whenever you need it - once, ten times, or from five different parts of your analysis. Without functions, code grows into an unmaintainable mass of copy-pasted logic that breaks in three places every time requirements change.</p>

<p>The practical trigger for writing a function is simple: if you are writing the same 5 lines in more than one place, you need a function. If you catch yourself copying a block of code and changing only one value, you need a function with a parameter. Every duplicate block is a bug waiting to happen when the logic changes and you update two out of three copies.</p>

<div class="art-callout"><strong>The DRY principle - Don't Repeat Yourself:</strong> In software, every piece of knowledge should have a single, unambiguous representation. In analyst work this means: if your discount calculation logic lives in five different cells or five different scripts, that is five places to update when finance changes the rate. One function, one place to change.</div>

<h2>The analogy to analyst work</h2>
<p>Think of a function as a saved formula in Excel, except you are not limited to a formula. You can put conditional logic, loops, lookups, and data transformations inside a function. You give it inputs (parameters), it produces an output (return value). You call it like a formula: <code>=CALCULATE_GST(price, rate)</code> becomes <code>calculate_gst(price, rate)</code>.</p>

<p>The difference from Excel: Python functions can return anything - a number, a string, a list, a dictionary, another function. They can call other functions. They can be tested in isolation. Once written well, they become building blocks for larger systems.</p>

<p>The syntax elements: <code>def</code> keyword, then the function name (use lowercase with underscores), then parentheses, then a colon. The function body is indented. When you call the function, you write the function name followed by parentheses - this is what triggers execution.</p>

<h2>Anatomy of a function definition</h2>
<pre><code>

    total = price + gst_amount
    return total

# The function is defined but not called.
print("Function defined. Nothing has run yet.")

# Now we call it:

print("GST-inclusive price for Rs. 1000:", result)

<h1>Real example: a reusable discount calculator</h1>
<p class="art-lead">This topic builds a complete, production-quality function from scratch. The goal is not to illustrate syntax - you have seen all the syntax already. The goal is to show how a function should be structured for real analyst automation: clear inputs, multiple computed outputs, formatted results, and edge case handling.</p>

<p>The function calculates the final price of a product after discount and GST. It returns a dictionary with every intermediate value - not just the final number, but the breakdown. Returning a dictionary instead of a single number is the right choice when the caller may need different parts of the result.</p>

<h2>The function definition</h2>
<pre><code>
def calculate_final_price(base_price, discount_pct=0, gst_rate=0.18):
    """
    Calculate discounted price with GST.

    Parameters:
        base_price   : float - original price before discount
        discount_pct : float - discount as a decimal (default 0, i.e. no discount)
        gst_rate     : float - GST rate as a decimal (default 0.18 = 18%)

    Returns:
        dict with keys: original_price, discount_amount, discounted_price, gst_amount, final_price
    """
    if base_price < 0:
        raise ValueError("base_price cannot be negative")
    if not (0 <= discount_pct <= 1):
        raise ValueError("discount_pct must be between 0 and 1")

    discount_amount = round(base_price * discount_pct, 2)
    discounted_price = round(base_price - discount_amount, 2)
    gst_amount = round(discounted_price * gst_rate, 2)
    final_price = round(discounted_price + gst_amount, 2)

    return {
        "original_price": base_price,
        "discount_amount": discount_amount,
        "discounted_price": discounted_price,
        "gst_amount": gst_amount,
        "final_price": final_price
    }

<h1>try and except: handling errors gracefully</h1>

<p class="art-lead">A script that crashes on one bad row is useless in production. Real data is messy. A Flipkart export will have rows with missing amounts. A PhonePe transaction log will have a corrupted timestamp somewhere. Your job is to write scripts that handle these cases without falling over.</p>

<div class="art-callout">
  <strong>The real-world problem:</strong> You are processing 50,000 rows overnight. On row 31,847, one value is missing. Without error handling, the entire script crashes, you wake up to no output, and you have to figure out what went wrong. With proper error handling, that row gets skipped and logged, and the rest of the 49,999 rows are processed fine.
</div>

<h2>What happens without error handling</h2>

<p>When Python hits an error, it raises an exception and stops executing. No more code runs. Everything that was supposed to happen after that line is lost.</p>

<pre><code>data = ['450', '320', '', '780', 'N/A']

total = 0
for value in data:
    total += int(value)  # crashes when it hits '' or 'N/A'

print("Total:", total)
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
ValueError: invalid literal for int() with base 10: ''
</div>

<p>The script crashes at the third element. The output line never runs. In a 50,000-row file, this means you get nothing.</p>

<h2>The try and except block</h2>

<p>Wrap the code that might fail inside a <code>try</code> block. Write what to do when it fails inside the <code>except</code> block. If the <code>try</code> block succeeds, the <code>except</code> block is skipped. If it fails, execution jumps immediately to <code>except</code>.</p>

<pre><code>data = ['450', '320', '', '780', 'N/A']

total = 0
skipped = 0

for value in data:
    try:
        total += int(value)
    except ValueError:
        skipped += 1
        print(f"Skipped bad value: '{value}'")

print(f"Total: {total}")
print(f"Rows skipped: {skipped}")
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Skipped bad value: ''
Skipped bad value: 'N/A'
Total: 1550
Reached end.
Rows skipped: 2
</div>

<p>Now the script processes what it can and skips what it cannot. That is the behaviour you want in production.</p>

<h2>Catching specific error types</h2>

<p>Always catch the specific exception type you expect, not a blanket catch-all. This prevents you from accidentally hiding bugs that are unrelated to the data. You can list multiple except blocks to handle different error types differently.</p>

<pre><code>def process_order(row):
    order_id = row['order_id']
    amount = float(row['amount'])  # might raise ValueError
    city = row['city']             # might raise KeyError
    return order_id, city, amount

rows = [
    {'order_id': '1001', 'city': 'Mumbai', 'amount': '450'},
    {'order_id': '1002', 'city': 'Delhi', 'amount': 'missing'},
    {'order_id': '1003', 'amount': '320'},  # no 'city' key
    {'order_id': '1004', 'city': 'Pune', 'amount': '890'},
]

results = []

for row in rows:
    try:
        result = process_order(row)
        results.append(result)
    except ValueError as e:
        print(f"Bad amount in row {row.get('order_id')}: {e}")
    except KeyError as e:
        print(f"Missing column in row {row.get('order_id')}: {e}")

print("Processed results:", results)
</code></pre>

Bad amount in row 1002: could not convert string to float: 'missing'

</div>

<h2>The except Exception as e pattern</h2>

<p>When you are not sure exactly which exception to expect, use <code>except Exception as e</code>. This catches almost all standard exceptions and stores the error message in the variable <code>e</code>. Use this for logging, but do not use it as a lazy substitute for understanding your errors.</p>

<p>The <code>finally</code> block runs no matter what, whether the <code>try</code> succeeded or the <code>except</code> caught an error. Use it for cleanup: closing files, closing database connections, releasing resources.</p>

    print("File read successfully. Length:", len(data))

<h1>Common errors every analyst hits</h1>

<p class="art-lead">In your first month writing Python for data work, you will hit the same six errors over and over. This is not a sign that you are bad at Python. It is just the terrain. Knowing what these errors mean and how to fix them quickly saves hours of frustration.</p>

<div class="art-callout">
  <strong>How to read a Python error:</strong> Look at the last line of the error message. It tells you the error type (NameError, TypeError, etc.) and a description. The lines above it show the traceback: the chain of function calls that led to the error. Start reading from the bottom up.
</div>

<h2>1. NameError: name is not defined</h2>

<p>Python tried to use a variable or function that does not exist yet. Most often caused by a typo in the variable name, or using a variable before assigning it, or forgetting to import something.</p>

45000
</div>

<h2>2. TypeError: wrong type for the operation</h2>

<p>You tried to do something with a value that does not support that operation. The most common case in data work: trying to do arithmetic on a string that looks like a number, because it came from a CSV file where everything is a string.</p>

<p>Now we read the file back. The key patterns here: we use <code>next(reader)</code> to skip the header, we wrap the processing of each row in a try/except block, and we use a <code>defaultdict</code> to accumulate per-city amounts without needing to check if the key exists first.</p>

<pre><code># --- Step 2: Read and analyze ---

<h1>What NumPy is and why it is faster</h1>

<p class="art-lead">NumPy is the foundation of almost all numerical work in Python. Pandas is built on top of it. SciPy uses it. Scikit-learn uses it. If you understand NumPy, you understand why Pandas feels fast and when to go lower-level for even more speed.</p>

<div class="art-callout">
  <strong>The one-line version:</strong> NumPy lets you apply operations to an entire column of numbers at once, instead of looping through them one by one. This is not just convenient, it is dramatically faster because the actual computation happens in C, not Python.
</div>

<h2>Why Python lists are slow for numbers</h2>

<p>A Python list is a collection of Python objects. Each object has a type tag, a reference count, and the actual value. When you loop through a list of numbers and add them up, Python is doing expensive object-level work on each element.</p>

<p>A NumPy array stores data in a contiguous block of memory, like a C array. Every element is the same type (all float64, all int32). There is no Python object overhead per element. Operations on the array are executed in compiled C code, and they are vectorised: the CPU processes multiple elements simultaneously using SIMD instructions.</p>

<pre><code>import time

# Python list: looping manually
prices = list(range(1_000_000))  # 1 million prices

start = time.time()
total = 0
for p in prices:
    total += p
python_time = time.time() - start
print(f"Python loop: {python_time:.4f} seconds, total = {total}")
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Python loop: 0.0731 seconds, total = 499999500000
</div>

<pre><code>import numpy as np

prices_np = np.array(range(1_000_000))

start = time.time()
total_np = prices_np.sum()
numpy_time = time.time() - start
print(f"NumPy sum:   {numpy_time:.4f} seconds, total = {total_np}")
print(f"NumPy is ~{python_time/numpy_time:.0f}x faster")
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
NumPy sum:   0.0008 seconds, total = 499999500000
NumPy is ~90x faster
</div>

<p>The actual speedup depends on your machine and what operation you are running. For simple aggregations on large arrays, 50x to 200x faster than a Python loop is typical. For more complex operations, the gap varies. But the direction is always the same: NumPy wins on numerical work.</p>

<h2>The mental model: a column in a spreadsheet</h2>

<p>Think of a NumPy array as a single column in a spreadsheet. You can add 10 to every cell in one command, not by clicking each cell one by one. You can filter rows where the value is above 500. You can get the average of the whole column. These are the operations NumPy is built for.</p>

<pre><code>import numpy as np

# A column of CRED cashback amounts (in rupees)
cashback = np.array([120, 45, 0, 230, 85, 0, 175, 60, 300, 0])

# Add a bonus of 10 to every cashback - one operation, no loop

print("Boosted cashback:", boosted)

# Apply 5% increase to all values
increased = cashback * 1.05
print("After 5% increase:", increased)
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Boosted cashback: [130  55  10 240  95  10 185  70 310  10]
After 5% increase: [126.   47.25   0.  241.5   89.25   0.  183.75  63.  315.    0.  ]
</div>

<h2>When analysts use NumPy directly</h2>

<p>Most of the time you will use Pandas, which wraps NumPy. But you use NumPy directly when: you are calculating statistics on a single column or array, you are doing element-wise math before loading data into Pandas, you are writing a custom aggregation that Pandas does not have built-in, or performance matters and you want to skip Pandas overhead.</p>

<div class="art-two-col">
  <div class="art-card">
    <div class="art-card-title">Use Pandas when</div>
    <p>You have a full table with multiple columns, need joins or groupbys, want SQL-like operations, or need to read/write CSV and Excel files.</p>
  </div>
  <div class="art-card">
    <div class="art-card-title">Use NumPy when</div>
    <p>You are doing pure numerical computation on arrays, need maximum speed, are working with matrix math, or building something that Pandas does not support natively.</p>
  </div>
</div>

<h2>Installation</h2>

<p>If you are using Google Colab, NumPy is already installed. If you are using Pandas, NumPy is already installed as a dependency. To install explicitly: <code>pip install numpy</code>. Import convention is always <code>import numpy as np</code>.</p>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>NumPy is fast because it stores data in contiguous memory with a fixed type and executes operations in compiled C. The key idea is vectorisation: do the operation on the whole array, not element by element. Every Pandas column is a NumPy array underneath.</div>

<h1>Creating arrays</h1>

<p class="art-lead">Before you can do anything useful with NumPy, you need to know how to create arrays. There are several ways, each suited to a different situation. You will use all of them.</p>

<h1>Array operations: sum, mean, min, max, std</h1>

<p class="art-lead">Aggregation functions are the core of data analysis. NumPy gives you fast implementations of all the standard statistics. These are the same numbers you pull in Excel or SQL, but now you can compute them in code, on large arrays, in milliseconds.</p>

<h1>Indexing and slicing arrays</h1>

<p class="art-lead">Knowing how to extract exactly the data you want from an array is as important as knowing the aggregation functions. NumPy's boolean indexing, in particular, is one of the most powerful and frequently-used patterns in data analysis. It is the foundation of how Pandas filtering works.</p>

<div class="art-callout">
  <strong>Three ways to index:</strong> Single position (get one element), slicing (get a range), boolean indexing (get elements that match a condition). Master boolean indexing. It is the most useful of the three for data work.
</div>

<h2>Single element access</h2>

<p>Access one element by its position, starting from 0. Negative indices count from the end: -1 is the last element, -2 is second to last.</p>

<pre><code>import numpy as np

# Nykaa order amounts for one week
orders = np.array([1200, 450, 890, 2300, 675, 3100, 540])

print("First order:", orders[0])
print("Last order:", orders[-1])
print("Third order:", orders[2])
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
First order: 1200
Last order: 540
Third order: 890
</div>

<h2>Slicing with [start:end:step]</h2>

<p>Slicing extracts a contiguous subset of the array. The start index is inclusive, the end index is exclusive. If you omit start, it defaults to 0. If you omit end, it defaults to the last element. The step is optional and defaults to 1.</p>

<pre><code># Daily GMV for 10 days
gmv = np.array([820, 790, 810, 835, 760, 1450, 1320, 800, 815, 790])

print("First 3 days:", gmv[:3])
print("Days 3 to 6:", gmv[2:6])       # index 2,3,4,5
print("Last 3 days:", gmv[-3:])
print("Every other day:", gmv[::2])    # step of 2
print("Reverse the array:", gmv[::-1])
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
First 3 days: [820 790 810]
Days 3 to 6: [810 835 760 1450]
Last 3 days: [800 815 790]
Every other day: [820 810 760 1320 815]
Reverse the array: [790 815 800 1320 1450 760 835 810 790 820]
</div>

<h2>Boolean indexing: the powerful one</h2>

<p>Boolean indexing is a two-step process. First, apply a condition to the array. This returns an array of True and False values, one per element. Second, use that boolean array to filter the original array. Only elements where the boolean is True are returned.</p>

<pre><code>orders = np.array([1200, 450, 890, 2300, 675, 3100, 540, 1800, 420, 2100])

# Step 1: create the boolean mask
high_value_mask = orders > 1000
print("Boolean mask:", high_value_mask)
print("Type:", type(high_value_mask))
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Boolean mask: [ True False False  True False  True False  True False  True]
Type: &lt;class 'numpy.ndarray'&gt;
</div>

<pre><code># Step 2: use the mask to filter
high_value_orders = orders[high_value_mask]
print("Orders above Rs 1000:", high_value_orders)
print("Count:", len(high_value_orders))
print("Total from high-value orders: Rs", high_value_orders.sum())
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Orders above Rs 1000: [1200 2300 3100 1800 2100]
Count: 5
Total from high-value orders: Rs 10500
</div>

<p>You can do this in one line without storing the mask separately:</p>

<pre><code>print("Orders above Rs 1000 (one line):", orders[orders > 1000])
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Orders above Rs 1000 (one line): [1200 2300 3100 1800 2100]
</div>

<h2>Combining conditions</h2>

<p>Use <code>&amp;</code> for AND, <code>|</code> for OR, <code>~</code> for NOT. You must wrap each condition in parentheses when combining. This is different from Python's <code>and</code>/<code>or</code>, which do not work element-wise on arrays.</p>

<pre><code># Orders between Rs 500 and Rs 2000 (mid-range orders)
mid_range = orders[(orders >= 500) & (orders <= 2000)]
print("Mid-range orders (Rs 500-2000):", mid_range)

# Orders below Rs 500 OR above Rs 2000 (extremes)
extremes = orders[(orders < 500) | (orders > 2000)]
print("Extreme orders:", extremes)
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Mid-range orders (Rs 500-2000): [1200  890  675 1800]
Extreme orders: [ 450 2300 3100  420 2100]
</div>

<h2>np.where(): conditional selection</h2>

<p><code>np.where(condition, value_if_true, value_if_false)</code> is like an element-wise if-else. It returns a new array where each element is chosen based on the condition. Useful for creating a label column based on a threshold.</p>

<pre><code># Tag each order as 'high' or 'low'
labels = np.where(orders > 1000, 'high', 'low')
print("Order labels:", labels)

# Count high-value orders using boolean sum
# (True = 1, False = 0 when summed)
high_count = np.sum(orders > 1000)
print(f"High-value order count: {high_count} out of {len(orders)}")
</code></pre>

</div>

<div class="art-warn"><strong>Warning.</strong> When combining boolean conditions in NumPy, always use <code>&amp;</code> and <code>|</code>, not <code>and</code> and <code>or</code>. Using <code>and</code> on two arrays raises a ValueError. Also, always wrap each condition in parentheses: <code>(orders &gt; 500) &amp; (orders &lt; 2000)</code>, not <code>orders &gt; 500 &amp; orders &lt; 2000</code> (the latter has operator precedence bugs).</div>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>Boolean indexing is the most important NumPy skill for data analysis. It is the same mechanism Pandas uses for filtering rows. The pattern is always: create a boolean mask with a condition, then use that mask in square brackets to filter the array. Master this and Pandas filtering will feel obvious.</div>

<h1>Broadcasting: doing math across a column</h1>

<p class="art-lead">Broadcasting is NumPy's way of applying an operation to every element in an array without writing a loop. You have already seen it in action: <code>prices * 1.18</code> multiplies every price by 1.18. That is broadcasting. Understanding it explicitly helps you write cleaner and faster numerical code.</p>

<div class="art-callout">
  <strong>The rule:</strong> If you apply an operation between an array and a scalar (a single number), NumPy broadcasts the scalar to match the array's shape and applies the operation element-wise. If you apply an operation between two arrays of the same shape, it applies element-wise. No loops needed.
</div>

<h2>Scalar broadcasting: apply the same operation to every element</h2>

<p>Multiplying, adding, subtracting, or dividing an array by a single number applies that operation to every element. This is what you want when transforming a whole column.</p>

<pre><code>import numpy as np

# Product prices in rupees (Nykaa skincare catalog)
prices_inr = np.array([299, 599, 149, 999, 449, 1299, 799])

# Convert to paise (multiply every price by 100)
prices_paise = prices_inr * 100
print("Prices in paise:", prices_paise)

# Apply 15% GST to every price
gst_rate = 0.15
prices_with_gst = prices_inr * (1 + gst_rate)
print("Prices with 15% GST:", prices_with_gst)

# Apply a flat Rs 50 discount to every product
discounted = prices_inr - 50
print("After Rs 50 discount:", discounted)
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Prices in paise: [ 29900  59900  14900  99900  44900 129900  79900]
Prices with 15% GST: [ 343.85  688.85  171.35 1148.85  516.35 1493.85  918.85]
After Rs 50 discount: [249 549  99 949 399 1249 749]
</div>

<p>Compare this to the equivalent Python loop:</p>

<pre><code># The loop version - same result, worse code
prices_list = [299, 599, 149, 999, 449, 1299, 799]
prices_with_gst_loop = [p * 1.15 for p in prices_list]
print("Loop result:", prices_with_gst_loop)
</code></pre>
<div class="art-output"><div class="art-output-label">OUTPUT</div>
Loop result: [343.85, 688.85, 171.35, 1148.85, 516.35, 1493.85, 918.85]
</div>

<p>Same result. But the NumPy version runs faster on large arrays and reads more naturally for data transformations.</p>

<h2>Element-wise operations between two arrays</h2>

<p>When you have two arrays of the same shape, NumPy applies the operation between corresponding elements: element 0 with element 0, element 1 with element 1, and so on.</p>

<pre><code># Cost price and selling price for each product

Margin percentage:    [66.1 71.1 65.6 66.5 66.3 62.4 66.5]
</div>

<p>Seven products, seven margins, computed in two lines. No loop, no zip, no enumerate.</p>

<h2>Practical example: tiered discounts</h2>

<p>Broadcasting is especially useful when you have different discount rates for different items, stored as an array, and you want to apply them all at once.</p>

<pre><code># Meesho: different discount rates per product category

<h1>Real example: revenue and order value stats</h1>

<p class="art-lead">This is a complete NumPy analysis using only NumPy, no Pandas. It uses realistic Nykaa daily order data for 30 days: both order count and GMV per day. We will compute everything a business analyst would want to see in a monthly review.</p>

<h1>What a DataFrame is</h1>
<p class="art-lead">A DataFrame is a two-dimensional table with labelled rows and columns. It is the core data structure in Pandas, and it is what you will use for almost every data analysis task in Python. Think of it as a smarter, programmable version of an Excel sheet.</p>

<h2>The DataFrame mental model</h2>
<p>An Excel sheet has rows and columns. A SQL table has rows and columns. A Pandas DataFrame also has rows and columns, but it lives in memory and you can manipulate it with code. The key difference from Excel: every operation is reproducible, auditable, and can be run on 10 rows or 10 million rows with the same code.</p>

<h1>Selecting columns and rows: loc vs iloc</h1>
<p class="art-lead">Selecting the right rows and columns is the most fundamental Pandas operation. There are two indexers you must know: loc for label-based selection and iloc for position-based selection. This confuses almost every beginner, so we will go through it carefully with lots of examples.</p>

<h2>Selecting columns</h2>
<p>Single column selection with square brackets returns a Series. Passing a list of column names returns a DataFrame.</p>

<pre><code>import pandas as pd

    'order_id': ['FLK-001','FLK-002','FLK-003','FLK-004','FLK-005'],
    'city': ['Mumbai','Delhi','Bengaluru','Hyderabad','Chennai'],
    'category': ['Electronics','Fashion','Electronics','Home','Fashion'],
    'amount': [12500, 850, 34200, 4200, 1100],
    'status': ['Delivered','Delivered','Cancelled','Delivered','Returned']
})

# Single column - returns a Series
print(df['city'])
print()

# Multiple columns - returns a DataFrame
print(df[['city', 'amount', 'status']])
</code></pre>
<div class="art-output">

  3&nbsp;&nbsp;Hyderabad<br>

  1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Delhi&nbsp;&nbsp;&nbsp;&nbsp;850&nbsp;&nbsp;Delivered<br>
  ...
</div>

<h2>loc: label-based selection</h2>
<p>loc selects rows and columns by their labels. For rows, the label is the index value (0, 1, 2 by default). For columns, the label is the column name. The format is df.loc[row_label, column_label].</p>

<pre><code># loc uses LABELS
# df.loc[row_label, column_label]

# Single row by index label
print(df.loc[0])           # Row with index label 0
print()

# Single value
print(df.loc[2, 'amount'])  # Row 2, amount column

# Range of rows (INCLUSIVE on both ends with loc)
print(df.loc[1:3])          # Rows 1, 2, AND 3

# Range of rows, specific columns
print(df.loc[0:2, ['city', 'amount']])
</code></pre>
<div class="art-output">
  <div class="art-output-label">OUTPUT</div>
  order_id&nbsp;&nbsp;&nbsp;FLK-001<br>
  city&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mumbai<br>
  ...<br><br>
  34200<br><br>
  &nbsp;&nbsp;order_id&nbsp;&nbsp;&nbsp;city&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;...<br>
  1&nbsp;&nbsp;FLK-002&nbsp;&nbsp;&nbsp;Delhi<br>
  2&nbsp;&nbsp;FLK-003&nbsp;&nbsp;Bengaluru<br>
  3&nbsp;&nbsp;FLK-004&nbsp;&nbsp;Hyderabad<br><br>
  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;city&nbsp;&nbsp;&nbsp;amount<br>
  0&nbsp;&nbsp;&nbsp;Mumbai&nbsp;&nbsp;12500<br>
  1&nbsp;&nbsp;&nbsp;&nbsp;Delhi&nbsp;&nbsp;&nbsp;&nbsp;850<br>
  2&nbsp;Bengaluru&nbsp;&nbsp;34200
</div>

<h2>iloc: position-based selection</h2>
<p>iloc selects rows and columns by their integer position. Position always starts at 0, regardless of what the index labels are. The format is df.iloc[row_position, column_position].</p>

<pre><code># iloc uses POSITIONS (integers only)
# df.iloc[row_position, column_position]

# First row (position 0)

# Specific cell: row position 2, column position 3
print(df.iloc[2, 3])     # Row at position 2, column at position 3 = amount

# Slice rows (EXCLUSIVE of end, like Python lists)
print(df.iloc[1:3])      # Rows at positions 1 and 2 (NOT 3)

# Last 2 rows
print(df.iloc[-2:])

# First 3 rows, first 3 columns
print(df.iloc[:3, :3])
</code></pre>

  2&nbsp;&nbsp;FLK-003&nbsp;&nbsp;Bengaluru&nbsp;&nbsp;Electronics<br><br>
  &nbsp;&nbsp;order_id&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;city&nbsp;&nbsp;&nbsp;category<br>

<h2>The critical difference: loc end is inclusive, iloc end is exclusive</h2>

<div class="art-compare">

    <div class="art-ctext">Position 3 is excluded.<br>Same as Python list slicing.<br>df.iloc[1:3] = positions 1, 2</div>
  </div>
  <div class="art-compare-good">

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>loc uses labels (column names, index values). iloc uses integer positions (0, 1, 2...). With the default integer index they look similar, but loc slicing is end-inclusive while iloc slicing is end-exclusive. When in doubt: use column names with loc for clarity, use iloc when you need the Nth row regardless of its label.</div>

<h1>Filtering rows with conditions</h1>
<p class="art-lead">Filtering is the most frequent operation in analyst work. You will filter for specific cities, date ranges, order statuses, value thresholds — constantly. Pandas makes this powerful but the syntax takes some getting used to.</p>

<h2>Single condition filter</h2>
<p>The pattern: write a condition that evaluates to True or False for each row, then pass it inside square brackets. Only rows where the condition is True are returned.</p>

<pre><code>import pandas as pd

    'order_id': ['ZOM-001','ZOM-002','ZOM-003','ZOM-004','ZOM-005','ZOM-006'],

})

# Filter for Mumbai orders only

print()

# Filter for high-value orders

  2&nbsp;&nbsp;ZOM-003&nbsp;&nbsp;Mumbai&nbsp;&nbsp;&nbsp;890&nbsp;Delivered&nbsp;&nbsp;&nbsp;4.5<br>
  4&nbsp;&nbsp;ZOM-005&nbsp;&nbsp;&nbsp;Delhi&nbsp;&nbsp;1200&nbsp;Delivered&nbsp;&nbsp;&nbsp;4.1<br>
  5&nbsp;&nbsp;ZOM-006&nbsp;&nbsp;Mumbai&nbsp;&nbsp;&nbsp;560&nbsp;&nbsp;Returned&nbsp;&nbsp;&nbsp;3.5
</div>

<h2>Multiple conditions with & and |</h2>
<p>Use & for AND, | for OR. Each condition must be wrapped in parentheses — this is required syntax in Pandas, not optional.</p>

<pre><code># Mumbai AND delivered AND high value

]

<div class="art-warn"><strong>Never use Python's and/or keywords for DataFrame filtering.</strong> Writing df[df['city']=='Mumbai' and df['amount']>500] raises a ValueError. You must use & and | with parentheses around each condition.</div>

<h1>Checking for nulls and handling them</h1>
<p class="art-lead">Missing data is the most common problem in real datasets. How you handle nulls directly affects your analysis results — ignore them incorrectly and your averages are wrong, your counts are misleading, and your conclusions are built on incomplete ground.</p>

<h2>Finding nulls</h2>
<pre><code>import pandas as pd
import numpy as np

# Simulating a Meesho seller report with missing data
df = pd.DataFrame({
    'seller_id': ['MS001','MS002','MS003','MS004','MS005','MS006'],
    'city': ['Surat','Jaipur',None,'Surat','Jaipur','Delhi'],
    'orders': [234, 189, 412, None, 302, 178],
    'revenue': [58500, 47250, 103000, None, 75500, 44500],
    'rating': [4.2, 3.8, 4.5, 4.1, None, 3.9]
})

# Check nulls per column
print(df.isnull().sum())
print()

# Null percentage
print((df.isnull().sum() / len(df) * 100).round(1))
</code></pre>
<div class="art-output">
  <div class="art-output-label">OUTPUT</div>
  seller_id&nbsp;&nbsp;&nbsp;0<br>
  city&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1<br>
  orders&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1<br>
  revenue&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1<br>
  rating&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1<br>
  dtype: int64<br><br>
  city&nbsp;&nbsp;&nbsp;&nbsp;16.7%<br>
  orders&nbsp;&nbsp;16.7%<br>
  ...
</div>

<h2>dropna(): remove rows with nulls</h2>
<p>dropna() removes any row that contains at least one null. Use this when a record with missing data is fundamentally unusable for your analysis.</p>

<pre><code># Drop any row that has a null in any column
df_clean = df.dropna()
print(f"Original: {len(df)} rows, After dropna: {len(df_clean)} rows")

# Drop only if specific columns are null
df_no_null_revenue = df.dropna(subset=['revenue', 'orders'])
print(f"After dropping rows with null revenue or orders: {len(df_no_null_revenue)} rows")
</code></pre>
<div class="art-output">
  <div class="art-output-label">OUTPUT</div>
  Original: 6 rows, After dropna: 3 rows<br>
  After dropping rows with null revenue or orders: 5 rows
</div>

<h2>fillna(): replace nulls with a value</h2>
<p>Use fillna() when you have a reasonable substitute for the missing value. The right fill strategy depends on the column and the business context.</p>

<pre><code># Fill numeric nulls with 0 (appropriate for counts/revenue where null means none)
df['orders'] = df['orders'].fillna(0)

# Fill with column mean (appropriate for ratings, delivery times, etc.)
df['rating'] = df['rating'].fillna(df['rating'].mean())

# Fill with a specific value
df['city'] = df['city'].fillna('Unknown')

# Forward fill: use the previous row's value (useful for time series data)
df['revenue'] = df['revenue'].fillna(method='ffill')

print(df)
</code></pre>
<div class="art-output">
  <div class="art-output-label">OUTPUT</div>
  All nulls filled — orders null becomes 0, rating null becomes 4.1 (mean), city becomes 'Unknown', revenue uses prior row's value
</div>

<div class="art-warn"><strong>Filling nulls changes your analysis.</strong> If you fill revenue nulls with 0, that seller now has Rs.0 revenue and drags down your city averages. If you fill with the mean, you are inflating count while keeping the mean artificially stable. Know what you are doing and document it. The safest approach: compute aggregations on non-null subsets explicitly.</div>

<div class="art-callout">A useful pattern: compute your KPI on the non-null subset, then separately report how many records were excluded. "Average rating: 4.1 (based on 5 of 6 sellers, 1 seller had no rating)" is a more honest output than silently computing on filled data.</div>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>Use df.isnull().sum() to find nulls. Use dropna() when incomplete rows are unusable. Use fillna() with a domain-appropriate value: 0 for missing counts, column mean for rates, 'Unknown' for missing categories. Always know what percentage of your data is null before drawing conclusions.</div>
`;

<h1>Changing data types in a DataFrame</h1>
<p class="art-lead">When you load a CSV, Pandas makes its best guess at data types. It is often wrong. Amount columns come in as strings, date columns come in as strings, boolean flags come in as 0/1 integers. Fixing types before analysis is not optional — wrong types produce wrong results.</p>

<h2>pd.to_numeric() with errors='coerce'</h2>
<p>astype() crashes if any value cannot be converted. pd.to_numeric(errors='coerce') is safer — it converts what it can and turns invalid values into NaN instead of crashing.</p>

<div class="art-callout">errors='coerce' is the right default for analyst work. You would rather have NaN (which you can detect and handle) than a crashed script. After converting, always check how many NaNs were introduced — a high count means the column had serious data quality issues.</div>

<div class="art-takeaway"><div class="art-tlabel">KEY POINT</div>Use astype() for clean conversions where you know the data is valid. Use pd.to_datetime() for date strings. Use pd.to_numeric(errors='coerce') for numeric columns from messy CSVs — it converts valid values and turns invalid ones into NaN instead of crashing.</div>

<h1>apply() and lambda on a column</h1>
<p class="art-lead">apply() lets you run any Python function across every row or every column of a DataFrame. When your transformation is too complex for vectorized operations, apply() is the tool. Lambda functions pair with apply() for quick one-liner transformations.</p>

<h2>apply() with a custom function</h2>
<pre><code>import pandas as pd

    'seller_id': ['MS001','MS002','MS003','MS004'],

    'category': ['Clothing','Clothing','Electronics','Home']

<h1>groupby(): the SQL GROUP BY of Pandas</h1>
<p class="art-lead">groupby() is the single most important Pandas operation for analysts. It splits a DataFrame into groups based on one or more columns, applies an aggregation function to each group, and combines the results. If you know SQL's GROUP BY, you already understand what it does — the syntax is just different.</p>

<h2>Basic groupby</h2>
<pre><code>import pandas as pd

df = pd.DataFrame({
    'city': ['Mumbai','Delhi','Mumbai','Bengaluru','Delhi','Mumbai','Bengaluru','Delhi'],
    'category': ['Food','Food','Grocery','Food','Grocery','Food','Grocery','Food'],
    'orders': [4200, 3800, 1200, 2900, 980, 3600, 1450, 4100],
    'revenue': [1050000, 950000, 180000, 725000, 147000, 900000, 217500, 1025000],
    'cancellations': [294, 342, 60, 145, 59, 252, 87, 369]
})

# Total orders by city
city_orders = df.groupby('city')['orders'].sum()
print(city_orders)
print()

# Average revenue by city
city_avg_rev = df.groupby('city')['revenue'].mean()
print(city_avg_rev.round(0))
</code></pre>

<h2>Groupby on multiple columns</h2>

<h2>Common aggregation functions</h2>

<div class="art-box">
  <div class="art-blabel">AGGREGATION FUNCTIONS WITH GROUPBY</div>
  <p><strong>.sum()</strong> — Total (GMV, order count, returns)</p>
  <p><strong>.mean()</strong> — Average (AOV, rating, delivery time)</p>

<h1>merge() and join(): combining DataFrames</h1>
<p class="art-lead">Real analytics almost always involves data from multiple tables. Orders are in one file, seller details in another, product info in a third. pd.merge() is how you combine them — it is the Pandas equivalent of SQL's JOIN.</p>

<h2>The basic merge</h2>
<pre><code>import pandas as pd

# Orders DataFrame
orders = pd.DataFrame({
    'order_id': ['FLK-001','FLK-002','FLK-003','FLK-004','FLK-005'],

<h1>train_test_split: what it does and why</h1>
<p class="art-lead">The fundamental rule of machine learning evaluation is simple: you cannot judge a model on the same data it was trained on. A model trained and tested on the same data will always look better than it actually is - it has effectively memorized the answers. train_test_split is the function that enforces this separation.</p>

<p>The analogy that makes this intuitive: if you give a student a practice test and then immediately give them the exact same questions as the actual exam, they will score well. But they have not learned anything - they just memorized the answers. A fair test requires new questions. The test set is the new questions.</p>

    buildPySidebar();
    renderPyTopic(hash);
  }
})();

function buildPySidebar() {
  var sb = document.getElementById('pySidebar');
  if (!sb) return;
  sb.innerHTML = PY_DATA.map(function(mod) {
    var isOpen = !!pyOpenModules[mod.id];
    var topicsHtml = mod.topics.map(function(t) {
      var active = t.id === pyCurrentTopicId;
      return '<div class="learn-topic-item'+(active?' active':'')+'" onclick="selectPyTopic(\''+t.id+'\')" id="pyt-'+t.id+'">' +
             '<span class="lt-dot"></span><span class="lt-title">'+escPy(t.title)+'</span></div>';
    }).join('');
    return '<div class="learn-module" id="pym-'+mod.id+'">' +
      '<div class="learn-module-header" onclick="togglePyModule(\''+mod.id+'\')">' +
        '<div class="lm-info"><span class="lm-title">'+escPy(mod.title)+'</span>' +
        '<span class="lm-count">'+mod.topics.length+' topics</span></div>' +
        '<span class="lm-chevron'+(isOpen?' open':'')+'">&#8250;</span>' +
      '</div>' +
      '<div class="learn-topics-list'+(isOpen?' open':'')+'">'+topicsHtml+'</div>' +
    '</div>';
  }).join('');
}

function togglePyModule(id) { pyOpenModules[id] = !pyOpenModules[id]; buildPySidebar(); }

function selectPyTopic(id) {
  pyCurrentTopicId = id;
  history.pushState({},'','#'+id);
  PY_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===id) pyOpenModules[m.id]=true; }); });
  buildPySidebar();
  renderPyTopic(id);
  if (window.innerWidth < 900) document.getElementById('pyContent').scrollIntoView({behavior:'smooth'});
}

function renderPyTopic(id) {
  var el = document.getElementById('pyContent');
  if (!el) return;
  var meta=null, modMeta=null;
  PY_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===id){meta=t;modMeta=m;} }); });
  if (!meta) return;
  var fi=-1;
  for(var i=0;i<PY_FLAT.length;i++){ if(PY_FLAT[i].id===id){fi=i;break;} }
  var prev = fi>0 ? PY_FLAT[fi-1] : null;
  var next = fi<PY_FLAT.length-1 ? PY_FLAT[fi+1] : null;
  var art = PY_CONTENT[id] || '<div class="coming-soon-block"><div class="cs-icon">&#128679;</div><div class="cs-title">Content loading...</div><div class="cs-sub">This topic is being prepared.</div></div>';
  el.innerHTML =
    '<div class="learn-breadcrumb"><span class="lbc-mod">'+escPy(modMeta.title)+'</span>' +
    '<span class="lbc-sep">&#8250;</span><span class="lbc-topic">'+escPy(meta.title)+'</span></div>' +
    '<div class="learn-article">'+art+'</div>' +
    '<div class="learn-nav-btns">' +
    (prev ? '<button class="learn-nav-btn prev" onclick="selectPyTopic(\''+prev.id+'\')"><span class="lnb-arrow">&#8249;</span><div class="lnb-info"><span class="lnb-label">Previous</span><span class="lnb-title">'+escPy(prev.title)+'</span></div></button>' : '<div></div>') +
    (next ? '<button class="learn-nav-btn next" onclick="selectPyTopic(\''+next.id+'\')"><div class="lnb-info"><span class="lnb-label">Next</span><span class="lnb-title">'+escPy(next.title)+'</span></div><span class="lnb-arrow">&#8250;</span></button>' : '<div></div>') +
    '</div>';
  el.scrollTop = 0;
  document.getElementById('pyContentWrap').scrollTo(0,0);
}

function handlePySearch(e) {
  var q = e.target.value.trim().toLowerCase();
  var items = document.querySelectorAll('.learn-topic-item');
  if (!q) { items.forEach(function(el){ el.style.display=''; }); return; }
  PY_DATA.forEach(function(m){ pyOpenModules[m.id]=true; });
  buildPySidebar();
  document.querySelectorAll('.learn-topic-item').forEach(function(el){
    el.style.display = el.querySelector('.lt-title').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function escPy(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('popstate', function(){
  var h = window.location.hash.replace('#','');
  if (h && PY_CONTENT[h]) {
    pyCurrentTopicId = h;
    PY_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===h) pyOpenModules[m.id]=true; }); });
    buildPySidebar(); renderPyTopic(h);
  }
});
</script>
</body>
</html>
