<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>

<title>Python for Data Analysts | AnalystWorld</title>

<style>
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans)}

/* ═══════════════════════════════════════════════
   ARTICLE TYPOGRAPHY
═══════════════════════════════════════════════ */
.learn-article{font-size:.96rem;line-height:1.75;color:var(--text);max-width:860px}
.learn-article h1{font-size:1.85rem;font-weight:800;line-height:1.2;margin:0 0 6px;letter-spacing:-.025em}
.learn-article h2{font-size:1.08rem;font-weight:700;color:var(--text);margin:44px 0 14px;display:flex;align-items:center;gap:10px}
.learn-article h2::before{content:'';display:inline-block;width:3px;height:18px;background:var(--accent);border-radius:2px;flex-shrink:0}
.learn-article h3{font-size:.95rem;font-weight:700;color:var(--text);margin:28px 0 10px}
.learn-article p{margin:0 0 16px;line-height:1.85;color:var(--muted);font-size:.94rem}
.learn-article code{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.2);border-radius:4px;padding:1px 7px;font-family:var(--mono);font-size:.82em;color:var(--accent)}

/* ═══════════════════════════════════════════════
   ARTICLE HERO
═══════════════════════════════════════════════ */
.art-hero{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 36px 28px;margin-bottom:40px;overflow:hidden}
.art-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(0,200,150,.1) 0%,transparent 70%);pointer-events:none}
.art-hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,.06) 0%,transparent 70%);pointer-events:none}
.art-hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.25);border-radius:20px;padding:3px 12px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.art-hero h1{font-size:1.95rem;font-weight:800;line-height:1.18;letter-spacing:-.025em;margin:0 0 14px;color:var(--text)}
.art-hero-lead{font-size:1rem;line-height:1.78;color:var(--muted);margin:0 0 20px;max-width:700px}
.art-hero-meta{display:flex;align-items:center;gap:20px;padding-top:16px;border-top:1px solid var(--border)}
.art-hero-meta span{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--hint)}

/* ═══════════════════════════════════════════════
   CODE WINDOWS (macOS style)
═══════════════════════════════════════════════ */
.art-code-window{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:28px 0 0;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.art-code-header{background:#1e1f2e;padding:10px 16px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.05)}
.art-cw-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.art-cw-dot.r{background:#ff5f57}.art-cw-dot.y{background:#febc2e}.art-cw-dot.g{background:#28c840}
.art-cw-name{margin-left:8px;font-size:.72rem;color:rgba(255,255,255,.3);font-family:var(--mono)}
.art-cw-copy{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(255,255,255,.35);font-size:.68rem;padding:3px 10px;cursor:pointer;transition:all .2s;font-family:var(--sans);letter-spacing:.03em}
.art-cw-copy:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.art-cw-copy.copied{color:#28c840;border-color:rgba(40,200,64,.3)}
.art-code-window pre{margin:0!important;border:none!important;border-radius:0!important;background:#1a1b2e!important;padding:18px 20px!important}
.art-code-window pre code{background:none!important;border:none!important;padding:0!important;font-size:.84rem!important}
/* Plain pre (non-windowed) */
.learn-article pre{background:#1a1b2e!important;border:1px solid var(--border);border-radius:10px 10px 0 0;padding:16px 18px;overflow-x:auto;margin:22px 0 0;position:relative}
.learn-article pre code.language-python{background:none!important;border:none!important;padding:0!important;font-size:.84rem!important;color:inherit}
/* Art-output block */
.art-output{background:#0e0f1a;border:1px solid rgba(255,255,255,.07);border-top:1px dashed rgba(255,255,255,.1);border-radius:0 0 10px 10px;padding:14px 18px;margin:0 0 24px;font-family:var(--mono);font-size:.81rem;color:#7dffcb;line-height:1.75}
.art-output-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:8px}
.art-code-window+.art-output{border-radius:0 0 12px 12px;margin-top:0}
.learn-article pre+.art-output{margin-top:0}

/* ═══════════════════════════════════════════════
   CALLOUTS
═══════════════════════════════════════════════ */
.art-callout{background:linear-gradient(135deg,rgba(0,200,150,.07),rgba(0,200,150,.02));border:1px solid rgba(0,200,150,.2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:16px 20px;margin:24px 0;font-size:.9rem;line-height:1.72;color:var(--muted)}
.art-callout strong{color:var(--accent)}
.art-callout-blue{background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(59,130,246,.02));border:1px solid rgba(59,130,246,.2);border-left:3px solid #3b82f6;border-radius:0 10px 10px 0;padding:16px 20px;margin:24px 0;font-size:.9rem;line-height:1.72;color:var(--muted)}
.art-callout-blue strong{color:#60a5fa}
.art-warn{background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.22);border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;padding:14px 18px;margin:20px 0;font-size:.9rem;color:var(--muted);line-height:1.68}
.art-warn strong{color:#f59e0b}
.art-callout-red{background:linear-gradient(135deg,rgba(239,68,68,.07),rgba(239,68,68,.02));border:1px solid rgba(239,68,68,.2);border-left:3px solid #ef4444;border-radius:0 10px 10px 0;padding:16px 20px;margin:24px 0;font-size:.9rem;line-height:1.72;color:var(--muted)}
.art-callout-red strong{color:#f87171}

/* ═══════════════════════════════════════════════
   CONCEPT / FEATURE CARDS
═══════════════════════════════════════════════ */
.art-concepts{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:24px 0}
.art-concept{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 16px;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:default}
.art-concept:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 6px 20px rgba(0,200,150,.1)}
.art-concept-icon{font-size:1.7rem;margin-bottom:10px;line-height:1}
.art-concept-title{font-size:.84rem;font-weight:700;color:var(--text);margin-bottom:5px}
.art-concept p{font-size:.79rem;color:var(--hint);margin:0;line-height:1.55}

/* ═══════════════════════════════════════════════
   METRIC CARDS
═══════════════════════════════════════════════ */
.art-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:24px 0}
.art-metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 12px;text-align:center}
.art-metric-val{font-size:1.9rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:4px}
.art-metric-label{font-size:.72rem;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;line-height:1.3}

/* ═══════════════════════════════════════════════
   MEMORY / VARIABLE DIAGRAM
═══════════════════════════════════════════════ */
.art-diagram{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;overflow-x:auto}
.art-diagram-title{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:20px;text-align:center}
.mem-viz{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.mem-box{border:2px solid var(--accent);border-radius:8px;overflow:hidden;min-width:110px;text-align:center;transition:transform .2s}
.mem-box:hover{transform:scale(1.04)}
.mem-box-label{background:var(--accent);color:#0a0b0e;font-size:.7rem;font-weight:800;padding:5px 8px;font-family:var(--mono)}
.mem-box-value{padding:10px 12px;font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--text)}
.mem-box-type{font-size:.62rem;color:var(--hint);padding:0 8px 6px;font-family:var(--mono)}
.mem-arrow{font-size:1.4rem;color:var(--accent);display:flex;align-items:center;padding-top:8px}
/* Flow diagrams */
.art-flow{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:20px 0;justify-content:center}
.art-flow-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.82rem;font-weight:600;color:var(--text);text-align:center}
.art-flow-arrow{color:var(--accent);font-size:1.1rem;padding:0 8px}

/* ═══════════════════════════════════════════════
   STEPS
═══════════════════════════════════════════════ */
.art-steps{margin:24px 0;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.art-step{display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);align-items:flex-start;transition:background .15s}
.art-step:last-child{border-bottom:none}
.art-step:hover{background:var(--surface)}
.art-snum{background:var(--accent);color:#0a0b0e;font-size:.72rem;font-weight:800;min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.art-sbody{flex:1}
.art-sbody strong{display:block;font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:4px}
.art-sbody p{margin:0;font-size:.86rem;color:var(--muted);line-height:1.62}

/* ═══════════════════════════════════════════════
   COMPARISON
═══════════════════════════════════════════════ */
.art-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
.art-compare-bad{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:16px}
.art-compare-good{background:rgba(0,200,150,.05);border:1px solid rgba(0,200,150,.2);border-radius:10px;padding:16px}
.art-clabel{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.art-compare-bad .art-clabel{color:#ef4444}
.art-compare-good .art-clabel{color:var(--accent)}
.art-ctext{font-size:.83rem;color:var(--muted);line-height:1.6;font-family:var(--mono)}

/* ═══════════════════════════════════════════════
   CARDS / GRID
═══════════════════════════════════════════════ */
.art-two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
.art-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s,transform .2s}
.art-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.art-card-title{font-size:.84rem;font-weight:700;color:var(--text);margin-bottom:6px}
.art-card p{font-size:.82rem;color:var(--muted);line-height:1.55;margin:0}

/* ═══════════════════════════════════════════════
   BOX / REFERENCE
═══════════════════════════════════════════════ */
.art-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin:22px 0}
.art-blabel{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}

/* ═══════════════════════════════════════════════
   TAKEAWAY
═══════════════════════════════════════════════ */
.art-takeaway{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:0 0 12px 12px;padding:20px 24px;margin-top:44px;font-size:.9rem;color:var(--muted);line-height:1.7}
.art-tlabel{font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}

/* ═══════════════════════════════════════════════
   LEAD + MISC
═══════════════════════════════════════════════ */
.art-lead{font-size:1.04rem;color:var(--text);line-height:1.82;margin-bottom:28px;font-weight:400}
.art-rule{border:none;border-top:1px solid var(--border);margin:36px 0}
.art-type-list{margin:18px 0}
.art-type{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px}
.art-wt{margin:24px 0}
.art-wt-head{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:12px}
.art-wt-body{display:flex;flex-direction:column;gap:8px}
.art-wt-step{display:flex;gap:12px;align-items:flex-start;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.art-wt-label{font-size:.72rem;font-weight:700;color:var(--accent);min-width:60px;padding-top:2px}
.art-wt-text{font-size:.87rem;color:var(--muted);line-height:1.6}

/* ═══════════════════════════════════════════════
   INLINE BADGE
═══════════════════════════════════════════════ */
.art-badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:.72rem;font-weight:700;font-family:var(--mono)}
.art-badge-green{background:rgba(0,200,150,.12);color:var(--accent);border:1px solid rgba(0,200,150,.2)}
.art-badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.art-badge-amber{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.art-badge-purple{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}

/* ═══════════════════════════════════════════════
   SCROLL ANIMATIONS
═══════════════════════════════════════════════ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse-accent{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,.3)}50%{box-shadow:0 0 0 6px rgba(0,200,150,0)}}
.py-anim{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.py-anim.visible{opacity:1;transform:translateY(0)}
.py-anim-delay-1{transition-delay:.1s}
.py-anim-delay-2{transition-delay:.2s}
.py-anim-delay-3{transition-delay:.3s}

/* ═══════════════════════════════════════════════
   COPY BUTTON (standalone pre)
═══════════════════════════════════════════════ */
.art-copy-btn{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(255,255,255,.35);font-size:.68rem;padding:3px 10px;cursor:pointer;font-family:var(--sans);transition:all .2s;letter-spacing:.03em}
.art-copy-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.art-copy-btn.copied{color:#28c840;border-color:rgba(40,200,64,.3)}

/* ═══════════════════════════════════════════════
   READING PROGRESS
═══════════════════════════════════════════════ */
.art-read-progress{position:sticky;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),#3b82f6);transform-origin:left;transform:scaleX(0);z-index:50;transition:transform .05s linear}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width:640px){
  .art-two-col{grid-template-columns:1fr}
  .art-compare{grid-template-columns:1fr}
  .art-concepts{grid-template-columns:1fr 1fr}
  .art-hero{padding:20px}
  .art-hero h1{font-size:1.5rem}
  .learn-article h1{font-size:1.45rem}
}
</style>
</head>

<h2>The print() function</h2>
<p>print() is the simplest and most-used function for analysts. It takes whatever you give it and displays it on screen. This sounds trivial until you realize that most of your debugging will be placing print() statements throughout your code to check whether values are what you expect.</p>
<p>Senior analysts at Swiggy or Razorpay use print() constantly while building a script, not because they are beginners but because checking intermediate values is the fastest way to catch errors before they corrupt your final output.</p>

  <p class="art-hero-lead">Python lists are flexible. NumPy arrays are fast. At 1 million elements, that difference is not academic — it is the difference between waiting 400 milliseconds and waiting 1 millisecond.</p>
  <div class="art-hero-meta"><span class="art-hero-time">7 min read</span><span>&#9881; Core Concept</span></div>
</div>

<p>Python is not a fast language by default. When you loop over a Python list, the interpreter checks the type of every element on every iteration. That overhead is invisible when your list has 10 items. When it has 10 lakh items — the size of a Flipkart daily order export — it becomes painfully slow.</p>

<p>NumPy solves this with two ideas: store data in a fixed-type block of memory, and run operations in compiled C code instead of Python. Together, these make numerical computations 100x to 400x faster than equivalent Python list operations.</p>

<p>This is not a minor convenience. Every data analysis library you will use at your job — Pandas, Scikit-learn, Matplotlib — is built on top of NumPy. When Pandas computes a mean, it calls NumPy internally. Understanding NumPy means understanding the foundation everything else stands on.</p>

    <div class="art-concept-icon">&#128204;</div>
    <div class="art-concept-title">Contiguous Memory</div>

  </div>
  <div class="art-concept">
    <div class="art-concept-icon">&#9889;</div>
    <div class="art-concept-title">C Execution</div>
    <p>Operations like sum and mean are written in C, compiled to machine code. No Python interpreter overhead per element.</p>
  </div>
  <div class="art-concept">
    <div class="art-concept-icon">&#128260;</div>
    <div class="art-concept-title">Vectorisation</div>
    <p>One operation applies to the entire array at once. No Python for-loop. The CPU processes multiple elements per clock cycle using SIMD instructions.</p>
  </div>
</div>

<h2>The memory layout difference</h2>

<p>A Python list is an array of pointers. Each pointer points to a Python object somewhere in memory. That object stores its type, a reference count, and then the actual value. For a list of 1 million integers, Python allocates 1 million separate objects scattered across memory.</p>

<p>A NumPy array is a single block of raw bytes. If you have a million 64-bit integers, NumPy allocates exactly 8 million bytes in one contiguous region. No pointers, no type tags per element, no scattered objects. The CPU's cache can hold large chunks of this data at once.</p>

<p>To combine two conditions, use <code>&amp;</code> for AND and <code>|</code> for OR. Wrap each condition in parentheses. This is not optional — without parentheses, operator precedence causes silent bugs.</p>

<p>For more than two outcomes, nest np.where calls or switch to np.select with a list of conditions and a matching list of choices — cleaner once you have three or more tiers.</p>

<div class="art-box py-anim">

<p>Matplotlib offers two ways to build charts. The <strong>pyplot interface</strong> uses a series of <code>plt.something()</code> calls and feels like MATLAB. It is quick for one-off exploratory charts. The <strong>object-oriented (OO) interface</strong> explicitly creates Figure and Axes objects and calls methods on them. It is the right choice for anything you will share, reuse, or embed in a report.</p>

<h2>The Data Leakage Problem</h2>
<p>Imagine studying for an exam by memorizing the answer key for the exact questions that will appear on the test. You would score 100%, but it would tell you nothing about whether you actually understand the material. Training and testing a model on the same rows of data is the exact same mistake.</p>
<p>This is called data leakage in its simplest form: information that should only appear during evaluation leaks into training, making your performance numbers look better than they really are. The fix is mechanical and non-negotiable: split your data before you do anything else, and never let the model see the test rows until evaluation time.</p>

<p>An 80/20 split, 80% of rows for training and 20% held back for testing, is the most common starting point because it balances two competing needs. The model needs enough training data to learn real patterns rather than noise. The test set needs to be large enough that your accuracy number is not just luck from a handful of rows.</p>

  document.getElementById('pyContentWrap').scrollTo(0,0);
}

function handlePySearch(e) {
  var q = e.target.value.trim().toLowerCase();
  var items = document.querySelectorAll('.learn-topic-item');
  if (!q) { items.forEach(function(el){ el.style.display=''; }); return; }
  PY_DATA.forEach(function(m){ pyOpenModules[m.id]=true; });
  buildPySidebar();
  document.querySelectorAll('.learn-topic-item').forEach(function(el){
    el.style.display = el.querySelector('.lt-title').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function escPy(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('popstate', function(){
  var h = window.location.hash.replace('#','');
  if (h && PY_CONTENT[h]) {
    pyCurrentTopicId = h;
    PY_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===h) pyOpenModules[m.id]=true; }); });
    buildPySidebar(); renderPyTopic(h);
  }
});

// ══════════════════════════════════════════════
//  COPY BUTTONS
// ══════════════════════════════════════════════
function initCopyButtons() {
  // Standalone pre blocks
  document.querySelectorAll('.learn-article pre').forEach(function(pre) {
    if (pre.querySelector('.art-copy-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'art-copy-btn';
    btn.textContent = 'Copy';
    btn.onclick = function() {
      var code = pre.querySelector('code');
      var text = code ? code.innerText : pre.innerText;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(function() { btn.textContent = 'Copy'; });
    };
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
  // art-code-window copy buttons
  document.querySelectorAll('.art-cw-copy').forEach(function(btn) {
    btn.onclick = function() {
      var win = btn.closest('.art-code-window');
      var code = win && win.querySelector('code');
      var text = code ? code.innerText : '';
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    };
  });
}

// ══════════════════════════════════════════════
//  SCROLL ANIMATIONS
// ══════════════════════════════════════════════
var _animObserver = null;
function initScrollAnimations() {
  if (_animObserver) _animObserver.disconnect();
  _animObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); _animObserver.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.py-anim').forEach(function(el) { _animObserver.observe(el); });
}

// ══════════════════════════════════════════════
//  READING PROGRESS BAR
// ══════════════════════════════════════════════
function initProgressBar() {
  var bar = document.querySelector('.art-read-progress');
  if (!bar) return;
  var wrap = document.getElementById('pyContentWrap');
  if (!wrap) return;
  function update() {
    var scrollTop = wrap.scrollTop;
    var scrollHeight = wrap.scrollHeight - wrap.clientHeight;
    var pct = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
    bar.style.transform = 'scaleX(' + pct + ')';
  }
  wrap.addEventListener('scroll', update, { passive: true });
}

// ══════════════════════════════════════════════
//  READ TIME ESTIMATE
// ══════════════════════════════════════════════
function calcReadTime(html) {
  var text = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
  var words = text.trim().split(' ').filter(Boolean).length;
  return Math.max(2, Math.round(words / 180));
}

// ══════════════════════════════════════════════
//  PATCH renderPyTopic to wire up extras
// ══════════════════════════════════════════════
var _origRenderPyTopic = renderPyTopic;
renderPyTopic = function(id) {
  _origRenderPyTopic(id);
  // Small delay so DOM is ready
  setTimeout(function() {
    if (window.Prism) Prism.highlightAll();
    initCopyButtons();
    initScrollAnimations();
    initProgressBar();
    // Inject reading time into any .art-hero-time spans
    var rt = document.querySelector('.art-hero-time');
    if (rt) {
      var art = PY_CONTENT[id] || '';
      rt.textContent = calcReadTime(art) + ' min read';
    }
  }, 60);
};

// Init on first load too
setTimeout(function() {
  if (window.Prism) Prism.highlightAll();
  initCopyButtons();
  initScrollAnimations();
  initProgressBar();
}, 200);
</script>
