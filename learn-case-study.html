<h1>What interviewers are really testing</h1>
<p>If you walk into a business case interview thinking they want the "right answer," you've already lost. There is no right answer. What they're actually testing is how you think.</p>
<p>When a Zomato interviewer asks "why did our order volume drop last Tuesday?", they already know the answer. The question isn't a puzzle for you to solve — it's a window into your reasoning process. Do you ask for context before diving in? Do you separate symptoms from causes? Do you know which metrics matter? Do you think like someone who'd actually be useful on a data team?</p>
<p>Most freshers walk in with textbook frameworks memorized and immediately start reciting a structure they googled at midnight. The interviewer has heard that exact structure forty times this week. What they remember is the candidate who paused, asked two smart questions, and then built a coherent argument from real data intuition.</p>
<p>Here's what they're actually scoring you on:</p>
<p><strong>Structure under pressure.</strong> Can you organize a messy problem without freezing? Real analysts get messy Slack messages at 9 AM saying "revenue looks off" — they don't get a neatly formatted case prompt.</p>
<p><strong>Business sense.</strong> Do you know that Zomato's order volume drops on hot weekday afternoons? That Swiggy runs aggressive discount campaigns on Tuesdays? Background knowledge signals genuine interest in the domain.</p>
<p><strong>Communication.</strong> Can you explain your logic as you go? A great analysis poorly communicated is useless. In a real job, you'll present to non-technical stakeholders every week.</p>
<p><strong>Knowing what you don't know.</strong> If you see a 20% drop and immediately say "marketing spend decreased," that's a guess, not analysis. A good candidate says "I'd want to check supply-side and demand-side separately before concluding anything."</p>
<p>The framework, the structure, the vocabulary — all of that is learnable in a week. What's harder to fake is whether you actually think like an analyst. This course exists to build that instinct.</p>
`;

<h1>What is a metric case</h1>
<p>A metric case puts one number in front of you and asks you to explain it. The number has moved — up, down, or in an unexpected direction — and your job is to figure out why.</p>
<p>These are the most common cases in product analytics and growth roles. At companies like PhonePe, Groww, or Zepto, this is literally what analysts do on a Monday morning when the weekend report lands in their inbox.</p>
<p>What makes a metric case different from a vague "tell me about X" question is that it's grounded. You have a specific measurement, a time period, and a direction of change. That concreteness is your friend — it gives you something to disaggregate.</p>
<p>Every metric case has the same underlying logic: the number you're looking at is an aggregate of something more granular. Orders are an aggregate of cities, categories, device types, user segments, time of day. A change in the aggregate always traces back to a change in at least one of those sub-segments.</p>
<p>Your job is to find which sub-segment moved, and then figure out why that sub-segment moved. Two separate questions. Don't conflate them.</p>
<p>Also: always ask if the metric itself is being measured correctly. About 30% of real-world metric drops are data pipeline issues, timezone bugs, or dashboard miscalculations. Checking for a data artifact first saves you hours of investigation. In an interview, just mentioning this — "I'd first sanity-check whether this is a tracking issue" — immediately signals senior-level thinking.</p>

CS_CONTENT['cs3-t2'] = `
<h1>Leading vs lagging indicators</h1>
<p>When you're diagnosing a metric, you need to know whether you're looking at a leading or lagging indicator. Most candidates don't make this distinction, and it leads to confused analysis.</p>
<p>A <strong>lagging indicator</strong> tells you what already happened. Revenue is a lagging indicator. So is monthly active users, churn rate, and NPS score. These are outcomes. They change slowly and they tell you that something upstream already went wrong.</p>
<p>A <strong>leading indicator</strong> tells you what's likely to happen. Session frequency, cart add rate, notification open rate, support ticket volume — these move before the outcome metric does. If Nykaa's app session frequency drops this week, order volume will probably drop next week.</p>
<p>Why does this matter for case studies? Because when an interviewer asks you why GMV dropped, the worst thing you can do is look at more lagging indicators to explain it. GMV is already the lagging indicator — looking at revenue or profit to explain GMV tells you nothing new.</p>
<p>What you want is to trace back upstream to the leading indicators. GMV = Orders × Average Order Value. Orders = Users × Conversion Rate. Conversion Rate = Sessions × Checkout Success Rate. Go upstream until you find where the break happened.</p>
<p>If DAU is fine but conversion rate dropped, you're looking at a product or pricing problem. If DAU dropped, you're looking at an acquisition or retention problem. These are completely different things that require different fixes.</p>
<p>Knowing this distinction also helps you recommend the right monitoring solution at the end of a case: "I'd set up alerts on leading indicators — specifically cart add rate and payment success rate — so we catch the signal before it hits revenue."</p>
`;

<p>A metric tree is how you structurally disaggregate a top-level metric into its constituent parts. It's the single most useful tool in metric case interviews, and it's simple once you've done it a few times.</p>

<p>DAU = New Users + Retained Users</p>

<p>Build a metric tree for every case you practice. Even for guesstimates and product cases, the tree-thinking habit will sharpen your analysis significantly.</p>

<h1>The hypothesis tree approach</h1>
<p>Root cause analysis is different from metric diagnosis in one important way: you're not just looking at what changed, you're trying to find exactly why it changed, and what to do about it.</p>
<p>The hypothesis tree is how you avoid randomly investigating things. You start with the symptom, break it into possible causes, and test the most likely one first.</p>
<p>The tree has three rules:</p>
<p><strong>Rule 1: MECE.</strong> Mutually Exclusive, Collectively Exhaustive. Your branches can't overlap (otherwise you count things twice) and they need to cover all possibilities (otherwise you might miss the real cause). Don't write "poor delivery experience" and "long delivery time" as separate branches — one includes the other.</p>
<p><strong>Rule 2: Prioritize by likelihood, not convenience.</strong> A lot of candidates check things that are easy to measure before things that are more likely. That's backwards. Check the most likely cause first, even if it's harder to verify.</p>
<p><strong>Rule 3: One branch at a time.</strong> Don't investigate two hypotheses simultaneously. You'll confuse the signal. Investigate one, rule it in or out, then move to the next.</p>
<p>For an operational metric like delivery time or cost per order, the hypothesis tree usually breaks into: people (driver behavior, restaurant behavior), process (routing algorithm, batching logic), and external factors (traffic, weather, platform outages).</p>
<p>For a revenue or engagement metric, the tree breaks into: product changes, marketing changes, external market changes (competition, macro events), and data issues.</p>
<p>Every good root cause analysis starts with "what are the possible buckets of cause?" — before touching a single data point.</p>

<p>This structure — headline, evidence, implication, action — is how management consultants communicate. It's not just for analysts talking to executives. It's the right format whenever you're presenting findings to anyone who has to make a decision based on your work.</p>

<p><strong>Complication.</strong> This is the "but." Something changed, something is wrong, something is unexpected. "However, this week we saw an 18% drop in DAU, concentrated in Tier-2 cities." The complication is what makes your analysis necessary.</p>
<p><strong>Question.</strong> This frames what needs to be answered. Usually you don't state this explicitly in a case interview — it was already stated in the prompt. But knowing what the implied question is keeps your analysis focused.</p>
<p><strong>Answer.</strong> This is the recommendation or conclusion, stated first. Not at the end — at the beginning. "My analysis suggests the DAU drop is driven by restaurant supply thinning in Tier-2 cities, and I'd recommend an immediate review of partner retention in those markets."</p>

<h1>Confusing correlation with causation</h1>
<p>This one gets smart candidates killed because they know enough statistics to look analytical but not enough to catch their own reasoning errors.</p>
<p>The classic example in a case interview: "Blinkit's orders are highest on days when driver availability is also highest. Therefore, increasing driver supply will increase orders."</p>
<p>This might be true. It might also be that both orders and driver availability are high on weekends and low on Tuesday mornings, and the real driver is day-of-week, not a causal relationship between supply and demand.</p>
<p>Correlation is when two things move together. Causation is when one thing causes the other. Knowing the difference sounds trivial. In practice, it's one of the hardest things to get right, especially when working with observational data — which is almost all the time in a business context.</p>
<p>The most common correlation-causation mistakes in case interviews:</p>
<p><em>"Users who use the app daily have 3x higher LTV"</em> → This doesn't mean making users open the app daily will increase their LTV. High-frequency users are already highly engaged — the causation likely runs the other way.</p>
<p><em>"Markets where we ran promotions saw 20% higher orders"</em> → Promotions might be deployed to markets that already have higher demand. Both might be caused by a third factor (market health).</p>
<p><em>"Customers who receive push notifications order more"</em> → You're likely sending push notifications to your more active users already. The correlation is selection bias.</p>
<p>When you catch yourself saying "therefore" or "which means" in an interview, slow down and ask: is this causation I can actually defend, or am I assuming it from a correlation?</p>
`;

// ── STATE ────────────────────────────────────────────────────────
var csCurrentTopicId = null;
var csOpenModules    = {};

// ── INIT ─────────────────────────────────────────────────────────
(function init() {
  // Apply saved theme
  var savedTheme = localStorage.getItem('msql_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);

  // Open first module by default
  csOpenModules[CS_DATA[0].id] = true;
  csCurrentTopicId = CS_DATA[0].topics[0].id;

  buildCsSidebar();

  // Check URL for a topic
  var hash = window.location.hash.replace('#', '');
  if (hash && CS_CONTENT[hash]) {
    csCurrentTopicId = hash;
    // open that module
    CS_DATA.forEach(function(mod) {
      mod.topics.forEach(function(t) {
        if (t.id === hash) csOpenModules[mod.id] = true;
      });
    });
    buildCsSidebar();
    renderCsTopic(hash);
  }
})();

// ── SIDEBAR ──────────────────────────────────────────────────────
function buildCsSidebar() {
  var sidebar = document.getElementById('csSidebar');
  if (!sidebar) return;

  sidebar.innerHTML = CS_DATA.map(function(mod) {
    var isOpen = !!csOpenModules[mod.id];
    var topicCount = mod.topics.length;

    var topicsHtml = mod.topics.map(function(topic) {
      var isActive = topic.id === csCurrentTopicId;
      return '<div class="learn-topic-item' + (isActive ? ' active' : '') + '" ' +
             'onclick="selectCsTopic(\'' + topic.id + '\')" ' +
             'id="cst-' + topic.id + '">' +
             '<span class="lt-dot"></span>' +
             '<span class="lt-title">' + escCs(topic.title) + '</span>' +
             '</div>';
    }).join('');

    return '<div class="learn-module" id="csm-' + mod.id + '">' +
      '<div class="learn-module-header" onclick="toggleCsModule(\'' + mod.id + '\')">' +
        '<span class="lm-icon">' + mod.icon + '</span>' +
        '<div class="lm-info">' +
          '<span class="lm-title">' + escCs(mod.title) + '</span>' +
          '<span class="lm-count">' + topicCount + ' topics</span>' +
        '</div>' +
        '<span class="lm-chevron' + (isOpen ? ' open' : '') + '">›</span>' +
      '</div>' +
      '<div class="learn-topics-list' + (isOpen ? ' open' : '') + '">' +
        topicsHtml +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleCsModule(modId) {
  csOpenModules[modId] = !csOpenModules[modId];
  buildCsSidebar();
}

// ── TOPIC RENDER ─────────────────────────────────────────────────
function selectCsTopic(topicId) {
  csCurrentTopicId = topicId;
  history.pushState({}, '', '#' + topicId);

  CS_DATA.forEach(function(mod) {
    mod.topics.forEach(function(t) {
      if (t.id === topicId) csOpenModules[mod.id] = true;
    });
  });

  buildCsSidebar();
  renderCsTopic(topicId);

  var content = document.getElementById('csContent');
  if (content && window.innerWidth < 900) {
    content.scrollIntoView({ behavior: 'smooth' });
  }
}

function renderCsTopic(topicId) {
  var content = document.getElementById('csContent');
  if (!content) return;

  var meta = null, modMeta = null;
  CS_DATA.forEach(function(mod) {
    mod.topics.forEach(function(t) {
      if (t.id === topicId) { meta = t; modMeta = mod; }
    });
  });
  if (!meta) return;

  var flatIdx = -1;
  for (var i = 0; i < CS_FLAT.length; i++) {
    if (CS_FLAT[i].id === topicId) { flatIdx = i; break; }
  }
  var prevTopic = flatIdx > 0 ? CS_FLAT[flatIdx - 1] : null;
  var nextTopic = flatIdx < CS_FLAT.length - 1 ? CS_FLAT[flatIdx + 1] : null;

  var articleHtml = CS_CONTENT[topicId] ||
    '<div class="coming-soon-block">' +
    '<div class="cs-icon">🚧</div>' +
    '<div class="cs-title">Article coming soon</div>' +
    '<div class="cs-sub">Our team is working on this content. Check back soon!</div>' +
    '</div>';

  content.innerHTML =
    '<div class="learn-breadcrumb">' +
      '<span class="lbc-mod">' + modMeta.icon + ' ' + escCs(modMeta.title) + '</span>' +
      '<span class="lbc-sep">›</span>' +
      '<span class="lbc-topic">' + escCs(meta.title) + '</span>' +
    '</div>' +
    '<div class="learn-article">' + articleHtml + '</div>' +
    '<div class="learn-nav-btns">' +
      (prevTopic ?
        '<button class="learn-nav-btn prev" onclick="selectCsTopic(\'' + prevTopic.id + '\')">' +
          '<span class="lnb-arrow">‹</span>' +
          '<div class="lnb-info"><span class="lnb-label">Previous</span><span class="lnb-title">' + escCs(prevTopic.title) + '</span></div>' +
        '</button>' : '<div></div>') +
      (nextTopic ?
        '<button class="learn-nav-btn next" onclick="selectCsTopic(\'' + nextTopic.id + '\')">' +
          '<div class="lnb-info"><span class="lnb-label">Next</span><span class="lnb-title">' + escCs(nextTopic.title) + '</span></div>' +
          '<span class="lnb-arrow">›</span>' +
        '</button>' : '<div></div>') +
    '</div>';

  content.scrollTop = 0;
  document.getElementById('csContentWrap').scrollTo(0, 0);
}

// ── SEARCH ───────────────────────────────────────────────────────
function handleCsSearch(e) {
  var q = e.target.value.trim().toLowerCase();
  var items = document.querySelectorAll('.learn-topic-item');
  if (!q) {
    items.forEach(function(el) { el.style.display = ''; });
    return;
  }
  CS_DATA.forEach(function(mod) { csOpenModules[mod.id] = true; });
  buildCsSidebar();
  items = document.querySelectorAll('.learn-topic-item');
  items.forEach(function(el) {
    var title = el.querySelector('.lt-title').textContent.toLowerCase();
    el.style.display = title.includes(q) ? '' : 'none';
  });
}

// ── UTIL ─────────────────────────────────────────────────────────
function escCs(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Handle popstate (browser back/forward)
window.addEventListener('popstate', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && CS_CONTENT[hash]) {
    csCurrentTopicId = hash;
    CS_DATA.forEach(function(mod) {
      mod.topics.forEach(function(t) {
        if (t.id === hash) csOpenModules[mod.id] = true;
      });
    });
    buildCsSidebar();
    renderCsTopic(hash);
  }
});
</script>
