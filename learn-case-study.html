<p class="art-lead">Ask exactly two or three clarifying questions before you touch the problem. Not one — that's too few. Not eight — that's stalling.</p>

<p class="art-lead">This gets smart candidates killed because they know enough statistics to look analytical but not enough to catch their own reasoning errors.</p>

<h2>The most common correlation-causation mistakes</h2>

<div class="art-warn">

// ── STATE & SIDEBAR ───────────────────────────────────────────────
var csCurrentTopicId = null;
var csOpenModules    = {};

(function init() {
  var saved = localStorage.getItem('msql_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  csOpenModules[CS_DATA[0].id] = true;
  csCurrentTopicId = CS_DATA[0].topics[0].id;
  buildCsSidebar();
  var hash = window.location.hash.replace('#','');
  if (hash && CS_CONTENT[hash]) {
    csCurrentTopicId = hash;
    CS_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===hash) csOpenModules[m.id]=true; }); });
    buildCsSidebar();
    renderCsTopic(hash);
  }
})();

function buildCsSidebar() {
  var sb = document.getElementById('csSidebar');
  if (!sb) return;
  sb.innerHTML = CS_DATA.map(function(mod) {
    var isOpen = !!csOpenModules[mod.id];
    var topicsHtml = mod.topics.map(function(t) {
      var active = t.id === csCurrentTopicId;
      return '<div class="learn-topic-item'+(active?' active':'')+'" onclick="selectCsTopic(\''+t.id+'\')" id="cst-'+t.id+'">' +
             '<span class="lt-dot"></span><span class="lt-title">'+escCs(t.title)+'</span></div>';
    }).join('');
    return '<div class="learn-module" id="csm-'+mod.id+'">' +
      '<div class="learn-module-header" onclick="toggleCsModule(\''+mod.id+'\')">' +
        '<div class="lm-info"><span class="lm-title">'+escCs(mod.title)+'</span>' +
        '<span class="lm-count">'+mod.topics.length+' topics</span></div>' +
        '<span class="lm-chevron'+(isOpen?' open':'')+'">›</span>' +
      '</div>' +
      '<div class="learn-topics-list'+(isOpen?' open':'')+'">'+topicsHtml+'</div>' +
    '</div>';
  }).join('');
}

function toggleCsModule(id) { csOpenModules[id] = !csOpenModules[id]; buildCsSidebar(); }

function selectCsTopic(id) {
  csCurrentTopicId = id;
  history.pushState({},'','#'+id);
  CS_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===id) csOpenModules[m.id]=true; }); });
  buildCsSidebar();
  renderCsTopic(id);
  if (window.innerWidth < 900) document.getElementById('csContent').scrollIntoView({behavior:'smooth'});
}

function renderCsTopic(id) {
  var el = document.getElementById('csContent');
  if (!el) return;
  var meta=null, modMeta=null;
  CS_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===id){meta=t;modMeta=m;} }); });
  if (!meta) return;
  var fi=-1;
  for(var i=0;i<CS_FLAT.length;i++){ if(CS_FLAT[i].id===id){fi=i;break;} }
  var prev = fi>0 ? CS_FLAT[fi-1] : null;
  var next = fi<CS_FLAT.length-1 ? CS_FLAT[fi+1] : null;
  var art = CS_CONTENT[id] || '<div class="coming-soon-block"><div class="cs-icon">🚧</div><div class="cs-title">Coming soon</div></div>';
  el.innerHTML =
    '<div class="learn-breadcrumb"><span class="lbc-mod">'+escCs(modMeta.title)+'</span>' +
    '<span class="lbc-sep">›</span><span class="lbc-topic">'+escCs(meta.title)+'</span></div>' +
    '<div class="learn-article">'+art+'</div>' +
    '<div class="learn-nav-btns">' +
    (prev ? '<button class="learn-nav-btn prev" onclick="selectCsTopic(\''+prev.id+'\')"><span class="lnb-arrow">‹</span><div class="lnb-info"><span class="lnb-label">Previous</span><span class="lnb-title">'+escCs(prev.title)+'</span></div></button>' : '<div></div>') +
    (next ? '<button class="learn-nav-btn next" onclick="selectCsTopic(\''+next.id+'\')"><div class="lnb-info"><span class="lnb-label">Next</span><span class="lnb-title">'+escCs(next.title)+'</span></div><span class="lnb-arrow">›</span></button>' : '<div></div>') +
    '</div>';
  el.scrollTop = 0;
  document.getElementById('csContentWrap').scrollTo(0,0);
}

function handleCsSearch(e) {
  var q = e.target.value.trim().toLowerCase();
  var items = document.querySelectorAll('.learn-topic-item');
  if (!q) { items.forEach(function(el){ el.style.display=''; }); return; }
  CS_DATA.forEach(function(m){ csOpenModules[m.id]=true; });
  buildCsSidebar();
  document.querySelectorAll('.learn-topic-item').forEach(function(el){
    el.style.display = el.querySelector('.lt-title').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function escCs(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('popstate', function(){
  var h = window.location.hash.replace('#','');
  if (h && CS_CONTENT[h]) {
    csCurrentTopicId = h;
    CS_DATA.forEach(function(m){ m.topics.forEach(function(t){ if(t.id===h) csOpenModules[m.id]=true; }); });
    buildCsSidebar(); renderCsTopic(h);
  }
});
</script>
